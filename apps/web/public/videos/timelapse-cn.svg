<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="锐历中文简历工作台演示">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#040606"/>
      <stop offset="0.55" stop-color="#0a0f11"/>
      <stop offset="1" stop-color="#020303"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111719"/>
      <stop offset="1" stop-color="#090d0f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#000" flood-opacity=".42"/>
    </filter>
    <style>
      .ui { font-family: "Inter", "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
      .serif { font-family: "Noto Serif CJK SC", "Songti SC", serif; }
      .label { fill: #8b9496; font-size: 13px; }
      .muted { fill: #647174; }
      .paper { fill: #fbfbf7; }
      .ink { fill: #111827; }
      .sub { fill: #4b5563; }
      .blue { fill: #1f3a5f; }
      .teal { fill: #0f766e; }
      .thin { stroke: #d8e0df; stroke-width: 1.5; }
      .accent { stroke: #1f3a5f; stroke-width: 2; }
      #resume { animation: pageFloat 6s ease-in-out infinite; transform-origin: 648px 386px; }
      @keyframes pageFloat {
        0%, 100% { transform: translateY(0) rotate(-.35deg); }
        50% { transform: translateY(-8px) rotate(.25deg); }
      }
      #cursor { animation: blink .8s steps(2) infinite; }
      @keyframes blink { 50% { opacity: .18; } }
      .scan { animation: scan 5.2s ease-in-out infinite; }
      @keyframes scan {
        0%, 100% { transform: translateY(0); opacity: .18; }
        45% { transform: translateY(330px); opacity: .5; }
      }
      .bar { animation: grow 8s ease-in-out infinite; transform-origin: 0 0; }
      @keyframes grow {
        0%, 15% { transform: scaleX(.18); }
        45%, 65% { transform: scaleX(.66); }
        88%, 100% { transform: scaleX(.94); }
      }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="260" cy="120" r="260" fill="#0f766e" opacity=".10"/>
  <circle cx="1020" cy="88" r="240" fill="#2563eb" opacity=".09"/>

  <g class="ui" filter="url(#shadow)">
    <rect x="72" y="44" width="1136" height="632" rx="18" fill="#070a0b" stroke="#1e2628"/>
    <rect x="72" y="44" width="1136" height="50" rx="18" fill="#121719"/>
    <rect x="72" y="76" width="1136" height="18" fill="#121719"/>
    <circle cx="104" cy="68" r="6" fill="#ef4444"/>
    <circle cx="128" cy="68" r="6" fill="#f59e0b"/>
    <circle cx="152" cy="68" r="6" fill="#10b981"/>
    <text x="642" y="73" text-anchor="middle" fill="#d7ddde" font-size="14" font-weight="700">锐历 / 中文示例简历</text>
    <rect x="1050" y="55" width="104" height="26" rx="13" fill="#12352f"/>
    <text x="1102" y="73" text-anchor="middle" fill="#a7f3d0" font-size="12" font-weight="700">自动保存</text>

    <rect x="72" y="94" width="64" height="582" fill="#090d0f"/>
    <g fill="#687477">
      <rect x="94" y="136" width="20" height="20" rx="6" fill="#d7e9e6"/>
      <rect x="96" y="198" width="16" height="16" rx="5"/>
      <rect x="96" y="254" width="16" height="16" rx="5"/>
      <rect x="96" y="310" width="16" height="16" rx="5"/>
      <rect x="96" y="366" width="16" height="16" rx="5"/>
      <rect x="96" y="422" width="16" height="16" rx="5"/>
      <rect x="96" y="478" width="16" height="16" rx="5"/>
    </g>

    <rect x="136" y="94" width="318" height="582" fill="url(#panel)"/>
    <rect x="454" y="94" width="458" height="582" fill="#121719"/>
    <rect x="912" y="94" width="296" height="582" fill="url(#panel)"/>

    <g transform="translate(162 122)">
      <text x="0" y="18" fill="#f3f7f7" font-size="21" font-weight="800">简历内容</text>
      <text x="0" y="42" class="label">按中文投递习惯维护结构化信息</text>

      <g transform="translate(0 74)">
        <text x="0" y="0" fill="#dce5e5" font-size="14" font-weight="700">基本信息</text>
        <rect x="0" y="16" width="248" height="34" rx="8" fill="#0d1315" stroke="#243134"/>
        <text x="14" y="38" fill="#e8eeee" font-size="13">林知夏</text>
        <rect x="0" y="62" width="248" height="34" rx="8" fill="#0d1315" stroke="#243134"/>
        <text x="14" y="84" fill="#e8eeee" font-size="13">高级产品经理 / B 端 SaaS</text>
      </g>

      <g transform="translate(0 196)">
        <text x="0" y="0" fill="#dce5e5" font-size="14" font-weight="700">经历亮点</text>
        <rect x="0" y="16" width="248" height="86" rx="10" fill="#0d1315" stroke="#243134"/>
        <text x="14" y="40" fill="#d8e1e1" font-size="13">线索到回款链路改版</text>
        <text x="14" y="64" fill="#7f8c8f" font-size="12">销售跟进效率提升 31%</text>
        <rect x="14" y="78" width="92" height="6" rx="3" fill="#1f3a5f" class="bar"/>
      </g>

      <g transform="translate(0 330)">
        <text x="0" y="0" fill="#dce5e5" font-size="14" font-weight="700">AI 优化</text>
        <rect x="0" y="16" width="248" height="112" rx="12" fill="#0c1718" stroke="#1d4f55"/>
        <text x="16" y="42" fill="#b6f1f1" font-size="13" font-weight="700">已识别 3 个可改进点</text>
        <text x="16" y="70" fill="#c7d5d6" font-size="12">把职责描述改成结果导向</text>
        <text x="16" y="94" fill="#c7d5d6" font-size="12">补充指标口径和业务规模</text>
      </g>
    </g>

    <g id="resume">
      <rect x="518" y="126" width="330" height="500" rx="8" class="paper"/>
      <rect x="518" y="126" width="330" height="500" rx="8" fill="none" stroke="#e6e9e7"/>
      <rect class="scan" x="538" y="150" width="290" height="32" rx="16" fill="#1f3a5f" opacity=".15"/>

      <g transform="translate(548 158)">
        <text x="0" y="30" class="serif ink" font-size="28" font-weight="800">林知夏</text>
        <text x="0" y="56" class="sub" font-size="12">高级产品经理 / B 端 SaaS / 上海</text>
        <line x1="0" y1="78" x2="270" y2="78" class="accent"/>
        <text x="0" y="104" class="blue" font-size="12" font-weight="800">个人总结</text>
        <text x="0" y="126" class="sub" font-size="10">7 年企业服务产品经验，主导 CRM、权限体系与数据看板。</text>
        <text x="0" y="144" class="sub" font-size="10">擅长把复杂业务流程拆成可交付的产品闭环。</text>

        <text x="0" y="184" class="blue" font-size="12" font-weight="800">工作经历</text>
        <line x1="0" y1="193" x2="270" y2="193" class="thin"/>
        <text x="0" y="216" class="ink" font-size="11" font-weight="800">云桥科技｜高级产品经理</text>
        <text x="220" y="216" class="sub" font-size="9">2021 - 至今</text>
        <circle cx="4" cy="240" r="2.6" class="blue"/>
        <text x="14" y="244" class="sub" font-size="9.5">重构线索到回款链路，销售跟进效率提升 31%。</text>
        <circle cx="4" cy="263" r="2.6" class="blue"/>
        <text x="14" y="267" class="sub" font-size="9.5">搭建经营仪表盘，周报制作时间下降 70%。</text>
        <circle cx="4" cy="286" r="2.6" class="blue"/>
        <text x="14" y="290" class="sub" font-size="9.5">推进权限中心重构，覆盖 12 条业务线。</text>

        <text x="0" y="332" class="blue" font-size="12" font-weight="800">项目经历</text>
        <line x1="0" y1="341" x2="270" y2="341" class="thin"/>
        <text x="0" y="364" class="ink" font-size="11" font-weight="800">AI 客服质检 MVP</text>
        <text x="0" y="386" class="sub" font-size="9.5">4 周完成灰度上线，沉淀质检标签与复盘流程。</text>
        <text x="0" y="424" class="blue" font-size="12" font-weight="800">教育经历</text>
        <line x1="0" y1="433" x2="270" y2="433" class="thin"/>
        <text x="0" y="456" class="sub" font-size="9.5">上海交通大学 / 信息管理与信息系统 / 本科</text>
      </g>
    </g>

    <g transform="translate(942 122)">
      <text x="0" y="18" fill="#f3f7f7" font-size="21" font-weight="800">中文预览</text>
      <text x="0" y="42" class="label">模板、导出和优化建议保持同步</text>

      <g transform="translate(0 74)">
        <text x="0" y="0" fill="#dce5e5" font-size="14" font-weight="700">模板风格</text>
        <g transform="translate(0 18)">
          <rect x="0" y="0" width="70" height="96" rx="6" fill="#fbfbf7"/>
          <rect x="8" y="12" width="28" height="5" rx="2" fill="#111827"/>
          <rect x="8" y="24" width="54" height="2" rx="1" fill="#cbd5d9"/>
          <rect x="8" y="34" width="54" height="2" rx="1" fill="#1f3a5f"/>
          <rect x="8" y="48" width="44" height="2" rx="1" fill="#d6dde0"/>
          <rect x="8" y="58" width="50" height="2" rx="1" fill="#d6dde0"/>
        </g>
        <g transform="translate(86 18)">
          <rect x="0" y="0" width="70" height="96" rx="6" fill="#fbfbf7"/>
          <rect x="0" y="0" width="22" height="96" rx="6" fill="#0f766e"/>
          <rect x="31" y="14" width="28" height="5" rx="2" fill="#111827"/>
          <rect x="31" y="28" width="31" height="2" rx="1" fill="#cbd5d9"/>
          <rect x="31" y="42" width="26" height="2" rx="1" fill="#0f766e"/>
          <rect x="31" y="56" width="31" height="2" rx="1" fill="#d6dde0"/>
        </g>
        <g transform="translate(172 18)">
          <rect x="0" y="0" width="70" height="96" rx="6" fill="#fbfbf7"/>
          <rect x="8" y="12" width="54" height="8" rx="2" fill="#27303f"/>
          <rect x="8" y="34" width="54" height="2" rx="1" fill="#cbd5d9"/>
          <rect x="8" y="48" width="46" height="2" rx="1" fill="#d6dde0"/>
          <rect x="8" y="62" width="50" height="2" rx="1" fill="#d6dde0"/>
        </g>
      </g>

      <g transform="translate(0 224)">
        <text x="0" y="0" fill="#dce5e5" font-size="14" font-weight="700">AI 建议</text>
        <rect x="0" y="18" width="242" height="64" rx="10" fill="#0d1517" stroke="#234048"/>
        <text x="16" y="43" fill="#d9ffff" font-size="13" font-weight="700">改成结果导向</text>
        <text x="16" y="64" fill="#91a3a6" font-size="12">突出业务指标、影响范围与复盘结论</text>
        <rect x="0" y="96" width="242" height="64" rx="10" fill="#0d1113" stroke="#243134"/>
        <text x="16" y="121" fill="#e5ebeb" font-size="13" font-weight="700">补足关键词</text>
        <text x="16" y="142" fill="#91a3a6" font-size="12">匹配产品经理、SaaS、数据分析</text>
      </g>

      <g transform="translate(0 432)">
        <rect x="0" y="0" width="242" height="48" rx="14" fill="#11352f"/>
        <text x="20" y="30" fill="#a7f3d0" font-size="14" font-weight="800">PDF 导出完成</text>
        <rect x="166" y="14" width="52" height="20" rx="10" fill="#1f5f55"/>
        <text x="192" y="29" text-anchor="middle" fill="#d1fae5" font-size="11">A4</text>
      </g>
    </g>
  </g>
</svg>
