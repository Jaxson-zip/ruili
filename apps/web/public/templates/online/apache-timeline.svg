				<text x="187" y="668" class="body" font-size="9.5" text-anchor="middle" fill="#4b5563">财务模型</text>
			
				<rect x="222" y="654" width="56" height="20" rx="10" fill="#4b5563" opacity=".10" stroke="#4b5563" stroke-opacity=".25"/>
				<text x="250" y="668" class="body" font-size="9.5" text-anchor="middle" fill="#4b5563">访谈纪要</text>
			
				<rect x="96" y="681" width="56" height="20" rx="10" fill="#4b5563" opacity=".10" stroke="#4b5563" stroke-opacity=".25"/>
				<text x="124" y="695" class="body" font-size="9.5" text-anchor="middle" fill="#4b5563">高管汇报</text>
			
				<rect x="159" y="681" width="48" height="20" rx="10" fill="#4b5563" opacity=".10" stroke="#4b5563" stroke-opacity=".25"/>
