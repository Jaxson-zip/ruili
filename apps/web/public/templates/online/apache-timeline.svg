				<circle cx="222" cy="501" r="2.4" fill="#4b5563"/>
				<text x="232" y="505" class="body" font-size="10">输出行业研究、竞品分析和管理层材料</text>
			
				
	

		<text x="96" y="626" class="section-title" fill="#4b5563" >技能</text>
